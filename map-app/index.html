<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>v1.420 map shell</title>
  <link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #c9302c;
      --paper: #f6f2ea;
      --text: #1a1410;
      --hairline: rgba(40, 28, 20, 0.16);
      --scanlines:
        repeating-linear-gradient(
          90deg,
          rgba(40, 28, 20, 0.018) 0 1px,
          transparent 1px 3px
        );
    }

    * {
      box-sizing: border-box;
    }

    html,
    body,
    #map {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #efe9dc;
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-feature-settings: "cv11", "ss01", "tnum";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        var(--scanlines),
        radial-gradient(ellipse at center, transparent 60%, rgba(40, 28, 20, 0.10) 100%);
      z-index: 999;
      mix-blend-mode: multiply;
    }

    .maplibregl-ctrl-top-right {
      top: 12px !important;
      right: 12px !important;
    }

    .maplibregl-ctrl-group {
      overflow: hidden !important;
      border: 1px solid rgba(40, 28, 20, 0.22) !important;
      border-radius: 2px !important;
      background: rgba(251, 248, 241, 0.92) !important;
      box-shadow: 0 10px 32px -18px rgba(40, 28, 20, 0.45) !important;
    }

    .maplibregl-ctrl-group button {
      background: transparent !important;
    }

    .maplibregl-ctrl-group button + button {
      border-top: 1px solid var(--hairline) !important;
    }

    .maplibregl-ctrl-attrib {
      background: rgba(251, 248, 241, 0.84) !important;
      color: rgba(26, 20, 16, 0.70) !important;
      font: 10px/1.3 Inter, sans-serif !important;
    }

    .maplibregl-ctrl-attrib a {
      color: rgba(26, 20, 16, 0.76) !important;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="anim-controls" style="position:absolute;bottom:24px;left:12px;z-index:10;display:flex;align-items:center;gap:8px;">
    <button id="anim-play-btn" style="width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.88);backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.15);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;" title="Play time-lapse">
      <svg id="anim-play-icon" width="14" height="14" viewBox="0 0 14 14" fill="#374151"><polygon points="3,1 12,7 3,13"/></svg>
      <svg id="anim-pause-icon" width="14" height="14" viewBox="0 0 14 14" fill="#374151" style="display:none"><rect x="2" y="1" width="3.5" height="12"/><rect x="8.5" y="1" width="3.5" height="12"/></svg>
    </button>
    <div id="anim-year-label" style="background:rgba(255,255,255,0.88);backdrop-filter:blur(8px);border-radius:6px;padding:4px 10px;font:600 13px -apple-system,Inter,sans-serif;color:#111827;box-shadow:0 2px 8px rgba(0,0,0,0.12);display:none;"></div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
  <script>
    // Set to R2 public URL for production, e.g. "https://pub-xxxxx.r2.dev/germany_pop.pmtiles"
    const PMTILES_URL = location.hostname === "127.0.0.1" ? "./germany_pop.pmtiles" : "https://pub-3bf2fc3bacfb4d3f8b6ed3debc07a9e1.r2.dev/germany_pop.pmtiles";
    const GERMANY_BOUNDS = [[5.85249, 47.271121], [15.022059, 55.065334]];
    let allChargers = null;
    const agsToStateName = {};
    let statesGeoJson = null;
    let districtsGeoJson = null;

    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
        sources: {
          osm: {
            type: "raster",
            tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
            tileSize: 256,
            attribution: "&copy; OpenStreetMap contributors",
          },
        },
        layers: [
          {
            id: "osm",
            type: "raster",
            source: "osm",
            paint: {
              "raster-saturation": -0.65,
              "raster-contrast": -0.08,
              "raster-opacity": 0.78,
            },
          },
        ],
      },
      center: [10.4373, 51.1682],
      zoom: 5.6,
      minZoom: 3,
      maxZoom: 16,
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "top-right");

    function fitGermany(duration = 0) {
      map.fitBounds(GERMANY_BOUNDS, {
        padding: 28,
        duration,
      });
    }

    async function loadCountries() {
      const response = await fetch("./countries.geojson");
      if (!response.ok) throw new Error(`Failed to load countries.geojson: ${response.status}`);
      const countries = await response.json();

      map.addSource("countries", {
        type: "geojson",
        data: countries,
      });

      map.addLayer({
        id: "country-fill",
        type: "fill",
        source: "countries",
        paint: {
          "fill-color": [
            "case",
            ["==", ["get", "iso_a3"], "DEU"],
            "rgba(100, 100, 100, 0.04)",
            "rgba(246, 242, 234, 0.02)",
          ],
          "fill-outline-color": "rgba(0, 0, 0, 0)",
        },
      });

      map.addLayer({
        id: "country-line",
        type: "line",
        source: "countries",
        paint: {
          "line-color": [
            "case",
            ["==", ["get", "iso_a3"], "DEU"],
            "rgba(100, 100, 100, 0.65)",
            "rgba(40, 28, 20, 0.26)",
          ],
          "line-width": [
            "interpolate",
            ["linear"],
            ["zoom"],
            3, 0.55,
            6, 0.9,
            10, 1.5,
          ],
        },
      });
    }

    async function loadOfficialBoundaries() {
      const [statesResponse, districtsResponse] = await Promise.all([
        fetch("./boundaries/bkg_states.geojson"),
        fetch("./boundaries/bkg_districts.geojson"),
      ]);
      if (!statesResponse.ok) throw new Error(`Failed to load bkg_states.geojson: ${statesResponse.status}`);
      if (!districtsResponse.ok) throw new Error(`Failed to load bkg_districts.geojson: ${districtsResponse.status}`);
      const [states, districts] = await Promise.all([
        statesResponse.json(),
        districtsResponse.json(),
      ]);

      statesGeoJson = states;
      for (const f of states.features) {
        if (f.properties.ags && f.properties.gen) {
          agsToStateName[f.properties.ags] = f.properties.gen;
        }
      }

      map.addSource("bkg-states", {
        type: "geojson",
        data: states,
      });
      districtsGeoJson = districts;
      map.addSource("bkg-districts", {
        type: "geojson",
        data: districts,
      });

      map.addLayer({
        id: "bkg-state-fill",
        type: "fill",
        source: "bkg-states",
        paint: {
          "fill-color": "rgba(0, 0, 0, 0)",
          "fill-outline-color": "rgba(0, 0, 0, 0)",
        },
      });

      map.addLayer({
        id: "bkg-state-line",
        type: "line",
        source: "bkg-states",
        paint: {
          "line-color": "rgba(100, 100, 100, 0.55)",
          "line-width": [
            "interpolate",
            ["linear"],
            ["zoom"],
            4, 0.8,
            8, 1.4,
            12, 2.0,
          ],
        },
      });

      map.addLayer({
        id: "bkg-district-line",
        type: "line",
        source: "bkg-districts",
        filter: ["==", ["get", "ags"], ""],
        paint: {
          "line-color": "rgba(100, 100, 100, 0.55)",
          "line-width": [
            "interpolate",
            ["linear"],
            ["zoom"],
            5, 0.7,
            8, 1.1,
            11, 1.6,
          ],
        },
      });

      map.addLayer({
        id: "bkg-district-hit",
        type: "fill",
        source: "bkg-districts",
        filter: ["==", ["get", "ags"], ""],
        paint: {
          "fill-color": "rgba(201, 48, 44, 0.01)",
          "fill-outline-color": "rgba(0, 0, 0, 0)",
        },
      });

      map.addLayer({
        id: "bkg-district-selected",
        type: "line",
        source: "bkg-districts",
        filter: ["==", ["get", "ags"], ""],
        paint: {
          "line-color": "rgba(100, 100, 100, 0.80)",
          "line-width": [
            "interpolate",
            ["linear"],
            ["zoom"],
            5, 1.5,
            10, 3.2,
          ],
        },
      });

      function hitChargerLayer(point) {
        const hits = map.queryRenderedFeatures(point, {
          layers: ["chargers", "state-bubble-circle", "district-bubble-circle"].filter((id) => map.getLayer(id)),
        });
        return hits.length > 0;
      }

      map.on("click", "bkg-state-fill", (event) => {
        if (hitChargerLayer(event.point)) return;
        const feature = event.features && event.features[0];
        const stateId = feature?.properties?.ags;
        if (!stateId) return;
        window.parent.postMessage({
          type: "map-region-click",
          level: "state",
          id: stateId,
        }, "*");
      });

      map.on("click", "bkg-district-hit", (event) => {
        if (hitChargerLayer(event.point)) return;
        const feature = event.features && event.features[0];
        const districtId = feature?.properties?.ags;
        if (!districtId) return;
        window.parent.postMessage({
          type: "map-region-click",
          level: "district",
          id: districtId,
          stateId: String(districtId).slice(0, 2),
        }, "*");
      });

      for (const layerId of ["bkg-state-fill", "bkg-district-hit"]) {
        map.on("mouseenter", layerId, () => {
          map.getCanvas().style.cursor = "pointer";
        });
        map.on("mouseleave", layerId, () => {
          map.getCanvas().style.cursor = "";
        });
      }
    }

    function filteredChargers(stateId, districtId) {
      if (!allChargers) return null;
      if (!stateId && !districtId) return allChargers;
      const stateName = agsToStateName[stateId] || "";
      return {
        ...allChargers,
        features: allChargers.features.filter((feature) => {
          const props = feature.properties || {};
          if (stateName) return props.state === stateName;
          return true;
        }),
      };
    }

    function applyChargerFilter(stateId, districtId) {
    }

    function selectRegion(level, id, stateId) {
      if (map.getLayer("bkg-district-selected")) {
        map.setFilter("bkg-district-selected", level === "district" && id
          ? ["==", ["get", "ags"], id]
          : ["==", ["get", "ags"], ""]);
      }
      if (map.getLayer("bkg-district-line")) {
        map.setFilter("bkg-district-line", stateId
          ? ["==", ["slice", ["get", "ags"], 0, 2], stateId]
          : ["==", ["get", "ags"], ""]);
      }
      if (map.getLayer("bkg-district-hit")) {
        map.setFilter("bkg-district-hit", stateId
          ? ["==", ["slice", ["get", "ags"], 0, 2], stateId]
          : ["==", ["get", "ags"], ""]);
      }
    }

    function polygonCentroid(geometry) {
      let coords;
      if (geometry.type === "MultiPolygon") {
        let best = geometry.coordinates[0];
        for (const poly of geometry.coordinates) {
          if (poly[0].length > best[0].length) best = poly;
        }
        coords = best[0];
      } else {
        coords = geometry.coordinates[0];
      }
      let sx = 0, sy = 0, n = coords.length;
      for (const [x, y] of coords) { sx += x; sy += y; }
      return [sx / n, sy / n];
    }

    const labelOverrides = {
      "Brandenburg": [13.85, 52.15],
    };

    function buildStateBubbles(chargers) {
      const byState = {};
      for (const f of chargers.features) {
        const st = f.properties.state || "";
        if (!st) continue;
        if (!byState[st]) byState[st] = { charge_points: 0, sites: 0 };
        byState[st].charge_points += f.properties.charge_points || 0;
        byState[st].sites += 1;
      }
      const features = [];
      if (!statesGeoJson) return { type: "FeatureCollection", features };
      const seen = new Set();
      for (const sf of statesGeoJson.features) {
        const name = sf.properties.gen;
        if (seen.has(name)) continue;
        seen.add(name);
        const agg = byState[name];
        if (!agg) continue;
        const center = labelOverrides[name] || polygonCentroid(sf.geometry);
        features.push({
          type: "Feature",
          geometry: { type: "Point", coordinates: center },
          properties: {
            state: name,
            charge_points: agg.charge_points,
            sites: agg.sites,
          },
        });
      }
      return { type: "FeatureCollection", features };
    }

    function normalizeCounty(s) {
      return s.toLowerCase().replace(/[^a-zäöüß0-9]/g, "");
    }

    function buildDistrictBubbles(chargers) {
      const byCounty = {};
      for (const f of chargers.features) {
        const c = f.properties.county || "";
        if (!c) continue;
        const key = normalizeCounty(c);
        if (!byCounty[key]) byCounty[key] = { charge_points: 0, sites: 0 };
        byCounty[key].charge_points += f.properties.charge_points || 0;
        byCounty[key].sites += 1;
      }
      const features = [];
      if (!districtsGeoJson) return { type: "FeatureCollection", features };
      const seen = new Set();
      for (const df of districtsGeoJson.features) {
        const p = df.properties;
        const ags = p.ags || "";
        if (seen.has(ags)) continue;
        seen.add(ags);
        const label = (p.bez || "") + " " + (p.gen || "");
        const key = normalizeCounty(label);
        const agg = byCounty[key];
        if (!agg) continue;
        features.push({
          type: "Feature",
          geometry: { type: "Point", coordinates: polygonCentroid(df.geometry) },
          properties: {
            district: p.gen,
            ags: ags,
            charge_points: agg.charge_points,
            sites: agg.sites,
          },
        });
      }
      return { type: "FeatureCollection", features };
    }

    async function loadBnetzaChargers() {
      const response = await fetch("./chargers.geojson");
      if (!response.ok) throw new Error(`Failed to load chargers.geojson: ${response.status}`);
      allChargers = await response.json();

      // Add start_year numeric property for animation filtering
      for (const f of allChargers.features) {
        const sd = f.properties.start_date;
        if (sd) {
          const parts = sd.split('.');
          f.properties.start_year = parseInt(parts[2], 10) || 2026;
        } else {
          f.properties.start_year = 2026;
        }
      }

      const stateBubbles = buildStateBubbles(allChargers);
      map.addSource("state-bubbles", { type: "geojson", data: stateBubbles });

      map.addLayer({
        id: "state-bubble-circle",
        type: "circle",
        source: "state-bubbles",
        maxzoom: 7,
        paint: {
          "circle-color": "rgba(90, 90, 90, 0.78)",
          "circle-radius": [
            "interpolate", ["linear"], ["get", "charge_points"],
            500, 16,
            5000, 24,
            20000, 36,
            40000, 44,
          ],
          "circle-stroke-color": "rgba(251, 248, 241, 0.90)",
          "circle-stroke-width": 1.5,
        },
      });

      map.addLayer({
        id: "state-bubble-label",
        type: "symbol",
        source: "state-bubbles",
        maxzoom: 7,
        layout: {
          "text-field": ["to-string", ["get", "charge_points"]],
          "text-font": ["Open Sans Semibold", "Arial Unicode MS Bold"],
          "text-size": 12,
          "text-allow-overlap": true,
        },
        paint: {
          "text-color": "#fff",
        },
      });

      const districtBubbles = buildDistrictBubbles(allChargers);
      map.addSource("district-bubbles", { type: "geojson", data: districtBubbles });

      map.addLayer({
        id: "district-bubble-circle",
        type: "circle",
        source: "district-bubbles",
        minzoom: 7,
        maxzoom: 10,
        paint: {
          "circle-color": "rgba(90, 90, 90, 0.72)",
          "circle-radius": [
            "interpolate", ["linear"], ["get", "charge_points"],
            10, 10,
            200, 16,
            1000, 22,
            5000, 30,
          ],
          "circle-stroke-color": "rgba(251, 248, 241, 0.90)",
          "circle-stroke-width": 1.25,
        },
      });

      map.addLayer({
        id: "district-bubble-label",
        type: "symbol",
        source: "district-bubbles",
        minzoom: 7,
        maxzoom: 10,
        layout: {
          "text-field": ["to-string", ["get", "charge_points"]],
          "text-font": ["Open Sans Semibold", "Arial Unicode MS Bold"],
          "text-size": 11,
          "text-allow-overlap": true,
        },
        paint: {
          "text-color": "#fff",
        },
      });

      map.addSource("bnetza-chargers", {
        type: "geojson",
        data: allChargers,
      });

      map.addLayer({
        id: "chargers",
        type: "circle",
        source: "bnetza-chargers",
        minzoom: 10,
        paint: {
          "circle-radius": [
            "interpolate",
            ["linear"],
            ["zoom"],
            8, 2.2,
            12, 3.6,
            16, 6.2,
          ],
          "circle-color": [
            "match",
            ["get", "class"],
            "ultra_300", "#e6242a",
            "hpc_150", "#f59f00",
            "fast_50", "#19a974",
            "ac_normal", "#2f80ed",
            "#8a7c6e",
          ],
          "circle-stroke-color": "rgba(251, 248, 241, 0.94)",
          "circle-stroke-width": [
            "interpolate",
            ["linear"],
            ["zoom"],
            8, 0.6,
            14, 1.15,
          ],
          "circle-opacity": 0.92,
        },
      });

      map.on("click", "state-bubble-circle", (event) => {
        const feature = event.features && event.features[0];
        if (!feature) return;
        const stateName = feature.properties.state;
        const ags = Object.entries(agsToStateName).find(([, n]) => n === stateName)?.[0];
        if (ags) {
          window.parent.postMessage({ type: "map-region-click", level: "state", id: ags }, "*");
        }
      });

      map.on("click", "district-bubble-circle", (event) => {
        const feature = event.features && event.features[0];
        if (!feature) return;
        const ags = feature.properties.ags;
        if (ags) {
          window.parent.postMessage({
            type: "map-region-click",
            level: "district",
            id: ags,
            stateId: String(ags).slice(0, 2),
          }, "*");
        }
      });

      map.on("click", "chargers", (event) => {
        const feature = event.features && event.features[0];
        if (!feature) return;
        const props = feature.properties || {};
        const kw = props.max_connector_kw ? `${Number(props.max_connector_kw).toLocaleString("de-DE")} kW max` : "unknown power";
        const points = props.charge_points ? `${props.charge_points} charge points` : "";
        const title = props.name || props.operator || "BNetzA charger";
        const place = [props.city, props.state].filter(Boolean).join(", ");
        new maplibregl.Popup({ closeButton: true, closeOnClick: true })
          .setLngLat(feature.geometry.coordinates)
          .setHTML(`
            <strong>${title}</strong><br>
            ${place}<br>
            ${kw} · ${points}<br>
            ${props.kind || ""}
          `)
          .addTo(map);
      });

      map.on("mouseenter", "district-bubble-circle", () => {
        map.getCanvas().style.cursor = "pointer";
      });
      map.on("mouseleave", "district-bubble-circle", () => {
        map.getCanvas().style.cursor = "";
      });
      map.on("mouseenter", "state-bubble-circle", () => {
        map.getCanvas().style.cursor = "pointer";
      });
      map.on("mouseleave", "state-bubble-circle", () => {
        map.getCanvas().style.cursor = "";
      });
      map.on("mouseenter", "chargers", () => {
        map.getCanvas().style.cursor = "pointer";
      });
      map.on("mouseleave", "chargers", () => {
        map.getCanvas().style.cursor = "";
      });
    }

    // ─── Coverage PMTiles Layer ──────────────────────────────────────────
    class CoveragePMTilesLayer {
      constructor(pm) {
        this.id = "coverage";
        this.type = "custom";
        this.renderingMode = "2d";
        this.pm = pm;
        this.tiles = new Map();
        this.threshold = 5.0 / 50.0;
        this.tier = 0;
        this.mode = 0; // 0=coverage, 1=demand
        this.enabled = true;
        this.frameId = 0;
      }

      onAdd(map, gl) {
        this.map = map;
        this.gl = gl;
        const vs = `
          precision highp float;
          uniform mat4 u_matrix;
          attribute vec2 a_pos;
          attribute vec2 a_uv;
          varying vec2 v_uv;
          void main() {
            gl_Position = u_matrix * vec4(a_pos, 0.0, 1.0);
            v_uv = a_uv;
          }`;
        const fs = `
          precision highp float;
          uniform sampler2D u_image;
          uniform float u_threshold;
          uniform float u_tier;
          uniform float u_mode;
          varying vec2 v_uv;
          void main() {
            vec4 t = texture2D(u_image, v_uv);
            if (t.r < 0.004) discard;
            float pop = t.r;
            if (u_mode > 0.5) {
              // Demand mode: pop * dist_DC = underserved intensity
              float demand = pop * t.b;
              if (demand < 0.01) discard;
              float intensity = pow(demand, 0.6);
              float a = mix(0.15, 0.72, intensity);
              // Yellow → Orange → Red gradient
              vec3 c = mix(vec3(1.0, 0.85, 0.2), vec3(0.85, 0.1, 0.15), intensity);
              gl_FragColor = vec4(c * a, a);
            } else {
              // Coverage mode (existing)
              float d;
              if (u_tier < 0.5) d = min(min(t.g, t.b), t.a);
              else if (u_tier < 1.5) d = t.g;
              else if (u_tier < 2.5) d = t.b;
              else d = t.a;
              float a = mix(0.10, 0.62, pow(pop, 0.5));
              vec3 c = d <= u_threshold
                ? vec3(0.176, 0.831, 0.749)
                : vec3(0.961, 0.620, 0.043);
              gl_FragColor = vec4(c * a, a);
            }
          }`;
        const compile = (type, src) => {
          const s = gl.createShader(type);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
            throw new Error(gl.getShaderInfoLog(s));
          return s;
        };
        this.program = gl.createProgram();
        gl.attachShader(this.program, compile(gl.VERTEX_SHADER, vs));
        gl.attachShader(this.program, compile(gl.FRAGMENT_SHADER, fs));
        gl.linkProgram(this.program);
        if (!gl.getProgramParameter(this.program, gl.LINK_STATUS))
          throw new Error(gl.getProgramInfoLog(this.program));
        this.aPos = gl.getAttribLocation(this.program, "a_pos");
        this.aUv = gl.getAttribLocation(this.program, "a_uv");
        this.uMatrix = gl.getUniformLocation(this.program, "u_matrix");
        this.uImage = gl.getUniformLocation(this.program, "u_image");
        this.uThreshold = gl.getUniformLocation(this.program, "u_threshold");
        this.uTier = gl.getUniformLocation(this.program, "u_tier");
        this.uMode = gl.getUniformLocation(this.program, "u_mode");
        this.buffer = gl.createBuffer();
        this._verts = new Float32Array(24);
      }

      render(gl, args) {
        if (!this.enabled) return;
        this.frameId++;
        const matrix = args && args.defaultProjectionData
          ? args.defaultProjectionData.mainMatrix
          : (args && args.modelViewProjectionMatrix) || args;
        const z = Math.max(5, Math.min(12, Math.floor(this.map.getZoom())));
        const tiles = this.visibleTiles(z);
        gl.useProgram(this.program);
        gl.uniformMatrix4fv(this.uMatrix, false, matrix);
        gl.uniform1f(this.uThreshold, this.threshold);
        gl.uniform1f(this.uTier, this.tier);
        gl.uniform1f(this.uMode, this.mode);
        gl.uniform1i(this.uImage, 0);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
        gl.enableVertexAttribArray(this.aPos);
        gl.enableVertexAttribArray(this.aUv);
        gl.vertexAttribPointer(this.aPos, 2, gl.FLOAT, false, 16, 0);
        gl.vertexAttribPointer(this.aUv, 2, gl.FLOAT, false, 16, 8);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        gl.disable(gl.DEPTH_TEST);
        gl.depthMask(false);
        for (const tile of tiles) {
          const entry = this.getTile(tile.z, tile.urlX, tile.y);
          if (!entry || entry.status !== "loaded") continue;
          entry.lastUsed = this.frameId;
          gl.bindTexture(gl.TEXTURE_2D, entry.texture);
          gl.bufferData(gl.ARRAY_BUFFER,
            this.tileVerts(tile.z, tile.renderX, tile.y), gl.STREAM_DRAW);
          gl.drawArrays(gl.TRIANGLES, 0, 6);
        }
        this.evict();
      }

      visibleTiles(z) {
        const n = 1 << z;
        const b = this.map.getBounds();
        const north = Math.min(85.051, b.getNorth());
        const south = Math.max(-85.051, b.getSouth());
        const xMin = Math.floor((b.getWest() + 180) / 360 * n) - 1;
        const xMax = Math.floor((b.getEast() + 180) / 360 * n) + 1;
        const latToY = (lat) => {
          const r = lat * Math.PI / 180;
          return (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * n;
        };
        const yMin = Math.max(0, Math.floor(latToY(north)) - 1);
        const yMax = Math.min(n - 1, Math.floor(latToY(south)) + 1);
        const tiles = [];
        for (let y = yMin; y <= yMax; y++)
          for (let rx = xMin; rx <= xMax; rx++)
            tiles.push({ z, renderX: rx, urlX: ((rx % n) + n) % n, y });
        return tiles;
      }

      tileVerts(z, x, y) {
        const n = 1 << z;
        const v = this._verts;
        const x0 = x/n, x1 = (x+1)/n, y0 = y/n, y1 = (y+1)/n;
        v[0]=x0; v[1]=y0; v[2]=0; v[3]=0;
        v[4]=x1; v[5]=y0; v[6]=1; v[7]=0;
        v[8]=x1; v[9]=y1; v[10]=1; v[11]=1;
        v[12]=x0; v[13]=y0; v[14]=0; v[15]=0;
        v[16]=x1; v[17]=y1; v[18]=1; v[19]=1;
        v[20]=x0; v[21]=y1; v[22]=0; v[23]=1;
        return v;
      }

      getTile(z, x, y) {
        const key = `${z}/${x}/${y}`;
        if (this.tiles.has(key)) {
          const e = this.tiles.get(key);
          e.lastUsed = this.frameId;
          return e;
        }
        const entry = { status: "loading", texture: null, lastUsed: this.frameId };
        this.tiles.set(key, entry);
        this.loadTile(z, x, y, entry);
        return entry;
      }

      async loadTile(z, x, y, entry) {
        try {
          const result = await this.pm.getZxy(z, x, y);
          if (!result) { entry.status = "empty"; return; }
          const blob = new Blob([result.data], { type: "image/png" });
          const bmp = await createImageBitmap(blob);
          const gl = this.gl;
          const tex = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, false);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, bmp);
          bmp.close();
          entry.texture = tex;
          entry.status = "loaded";
          this.map.triggerRepaint();
        } catch (e) {
          entry.status = "error";
          console.warn(`Coverage tile ${z}/${x}/${y}:`, e.message);
        }
      }

      evict() {
        if (this.tiles.size <= 200) return;
        const entries = [...this.tiles.entries()]
          .filter(([, e]) => e.status !== "loading")
          .sort((a, b) => a[1].lastUsed - b[1].lastUsed);
        for (const [key, e] of entries) {
          if (this.tiles.size <= 150) break;
          if (e.texture) this.gl.deleteTexture(e.texture);
          this.tiles.delete(key);
        }
      }

      setRadius(km) { this.threshold = km / 50.0; if (this.map) this.map.triggerRepaint(); }
      setTier(t) { this.tier = t; if (this.map) this.map.triggerRepaint(); }
      setMode(m) { this.mode = m; if (this.map) this.map.triggerRepaint(); }
      setEnabled(v) { this.enabled = v; if (this.map) this.map.triggerRepaint(); }
    }

    let coverageLayer = null;

    window.addEventListener("message", (event) => {
      const message = event.data || {};
      if (message.type === "set-charger-filter") {
        applyChargerFilter(message.stateId || "", message.districtId || "");
      }
      if (message.type === "select-region") {
        selectRegion(message.level || "", message.id || "", message.stateId || "");
      }
      if (message.type === "set-coverage-radius" && coverageLayer) {
        coverageLayer.setRadius(message.radius || 5);
      }
      if (message.type === "set-coverage-tier" && coverageLayer) {
        coverageLayer.setTier(message.tier || 0);
      }
      if (message.type === "toggle-coverage" && coverageLayer) {
        coverageLayer.setEnabled(message.enabled !== false);
      }
      if (message.type === "set-coverage-mode" && coverageLayer) {
        coverageLayer.setMode(message.mode || 0);
      }
    });

    map.on("load", async () => {
      try {
        await loadOfficialBoundaries();
        await loadBnetzaChargers();
        fitGermany(0);
      } catch (error) {
        console.error(error);
      }
      try {
        const { PMTiles } = await import("https://cdn.jsdelivr.net/npm/pmtiles@3/+esm");
        const pm = new PMTiles(PMTILES_URL);
        coverageLayer = new CoveragePMTilesLayer(pm);
        const before = map.getLayer("state-bubble-circle") ? "state-bubble-circle" : undefined;
        map.addLayer(coverageLayer, before);
        window.parent.postMessage({ type: "coverage-ready" }, "*");
      } catch (e) {
        console.warn("Coverage layer:", e);
      }
    });

    // ─── Time-lapse animation ───────────────────────────────────────────
    (function() {
      const playBtn = document.getElementById('anim-play-btn');
      const playIcon = document.getElementById('anim-play-icon');
      const pauseIcon = document.getElementById('anim-pause-icon');
      const yearLabel = document.getElementById('anim-year-label');

      let animating = false;
      let animYear = null;
      let animTimer = null;
      const START_YEAR = 2010;
      const END_YEAR = 2026;

      function setAnimYear(year) {
        animYear = year;
        if (year === null) {
          yearLabel.style.display = 'none';
          // Remove filter — show all chargers
          if (map.getLayer('chargers')) {
            map.setFilter('chargers', null);
          }
          // Reset bubble data to full counts
          window.parent.postMessage({ type: "animation-year", year: null }, "*");
        } else {
          yearLabel.style.display = 'block';
          yearLabel.textContent = year;
          // Filter chargers by start_year <= year
          if (map.getLayer('chargers')) {
            map.setFilter('chargers', ['<=', ['get', 'start_year'], year]);
          }
          window.parent.postMessage({ type: "animation-year", year: year }, "*");
        }
      }

      function play() {
        animating = true;
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';

        if (animYear === null || animYear >= END_YEAR) {
          animYear = START_YEAR - 1;
        }

        function step() {
          if (!animating) return;
          animYear++;
          if (animYear > END_YEAR) {
            pause();
            setAnimYear(null);
            return;
          }
          setAnimYear(animYear);
          animTimer = setTimeout(step, 800);
        }
        step();
      }

      function pause() {
        animating = false;
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
        if (animTimer) { clearTimeout(animTimer); animTimer = null; }
      }

      playBtn.addEventListener('click', () => {
        if (animating) pause();
        else play();
      });

      // Listen for year sync from parent (growth chart hover)
      window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'set-animation-year') {
          if (animating) pause();
          setAnimYear(e.data.year);
        }
      });
    })();
  </script>
</body>
</html>
