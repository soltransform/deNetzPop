<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>v1.420</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      color: #111;
      font-family: Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(520px, 58vw) minmax(420px, 1fr);
      width: 100vw;
      height: 100vh;
    }

    .map-pane {
      position: relative;
      min-width: 0;
      border-right: 1px solid #d9d9d9;
      background: #f3f4f6;
    }

    .map-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      font-size: 13px;
    }

    .top-bar label {
      font-weight: 600;
      font-size: 12px;
      color: #555;
      white-space: nowrap;
    }

    .top-bar select {
      height: 30px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #111;
      font: 13px/1.2 Inter, sans-serif;
      min-width: 160px;
    }

    .top-bar button {
      height: 30px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #555;
      font: 13px/1.2 Inter, sans-serif;
      padding: 0 10px;
      cursor: pointer;
    }

    .top-bar button:hover {
      background: #f5f5f5;
    }

    .right-pane {
      min-width: 0;
      background: #ffffff;
      padding: 22px;
      overflow: auto;
    }

    @media (max-width: 960px) {
      body {
        overflow: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 52vh minmax(48vh, auto);
        height: auto;
        min-height: 100vh;
      }

      .map-pane {
        border-right: 0;
        border-bottom: 1px solid #d9d9d9;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="map-pane">
      <div class="top-bar">
        <label for="state-select">Bundesland</label>
        <select id="state-select" disabled>
          <option value="">Loading...</option>
        </select>
        <label for="district-select">Kreis</label>
        <select id="district-select" disabled>
          <option value="">Select Bundesland first</option>
        </select>
        <button id="clear-filter" type="button">Clear</button>
      </div>
      <iframe class="map-frame" id="map-frame" title="Germany charger map" src="/v1.420/map-app/index.html"></iframe>
    </section>
    <section class="right-pane" aria-label="Statistics">
    </section>
  </main>

  <script>
    const mapFrame = document.getElementById("map-frame");
    const stateSelect = document.getElementById("state-select");
    const districtSelect = document.getElementById("district-select");
    const clearButton = document.getElementById("clear-filter");

    let regions = null;

    function mapReady() {
      return mapFrame.contentWindow;
    }

    function postToMap(message) {
      if (!mapReady()) return;
      mapFrame.contentWindow.postMessage(message, "*");
    }

    function populateStates() {
      stateSelect.innerHTML = '<option value="">All Germany</option>';
      for (const state of regions.states) {
        const option = document.createElement("option");
        option.value = state.id;
        option.textContent = state.name;
        stateSelect.appendChild(option);
      }
      stateSelect.disabled = false;
    }

    function populateDistricts(stateId) {
      districtSelect.innerHTML = '<option value="">All Kreise</option>';
      if (!stateId) {
        districtSelect.disabled = true;
        districtSelect.innerHTML = '<option value="">Select Bundesland first</option>';
        return;
      }
      for (const district of regions.districts.filter((item) => item.state_id === stateId)) {
        const option = document.createElement("option");
        option.value = district.id;
        option.textContent = district.label;
        districtSelect.appendChild(option);
      }
      districtSelect.disabled = false;
    }

    function selectedRegion() {
      const stateId = stateSelect.value;
      const districtId = districtSelect.value;
      if (districtId) {
        return {
          level: "district",
          id: districtId,
          bbox: regions.districts.find((item) => item.id === districtId)?.bbox,
        };
      }
      if (stateId) {
        return {
          level: "state",
          id: stateId,
          bbox: regions.states.find((item) => item.id === stateId)?.bbox,
        };
      }
      return { level: "", id: "", bbox: null };
    }

    function applySelection() {
      const region = selectedRegion();
      postToMap({
        type: "set-charger-filter",
        stateId: stateSelect.value,
        districtId: districtSelect.value,
      });
      postToMap({
        type: "select-region",
        level: region.level,
        id: region.id,
        stateId: stateSelect.value,
      });
    }

    stateSelect.addEventListener("change", () => {
      populateDistricts(stateSelect.value);
      applySelection();
    });

    districtSelect.addEventListener("change", applySelection);

    clearButton.addEventListener("click", () => {
      stateSelect.value = "";
      populateDistricts("");
      applySelection();
    });

    window.addEventListener("message", (event) => {
      const message = event.data || {};
      if (message.type !== "map-region-click" || !regions) return;

      if (message.level === "state" && message.id) {
        stateSelect.value = message.id;
        populateDistricts(message.id);
        districtSelect.value = "";
        applySelection();
      }

      if (message.level === "district" && message.id && message.stateId) {
        if (stateSelect.value !== message.stateId) {
          stateSelect.value = message.stateId;
          populateDistricts(message.stateId);
        }
        districtSelect.value = message.id;
        applySelection();
      }
    });

    async function init() {
      const response = await fetch("/v1.420/data/official_regions.json");
      if (!response.ok) throw new Error(`Failed to load official_regions.json: ${response.status}`);
      regions = await response.json();
      populateStates();
    }

    init().catch((error) => {
      stateSelect.innerHTML = `<option value="">${error.message}</option>`;
      console.error(error);
    });
  </script>
</body>
</html>
