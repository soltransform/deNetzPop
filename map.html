<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>v1.420 clean map</title>
  <link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    html,
    body,
    #map {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #f3f4f6;
      font-family: Arial, Helvetica, sans-serif;
    }

    .map-action {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2;
      padding: 7px 10px;
      border: 1px solid #c7c7c7;
      background: rgba(255, 255, 255, 0.94);
      color: #111;
      font: 13px/1.2 Arial, Helvetica, sans-serif;
      cursor: pointer;
    }

    .map-action:hover {
      background: #fff;
    }

    .maplibregl-ctrl-attrib {
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <button class="map-action" id="reset-map" type="button">Germany</button>

  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
  <script>
    const GERMANY_BOUNDS = [[5.85249, 47.271121], [15.022059, 55.065334]];

    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          carto_base: {
            type: "raster",
            tiles: ["https://a.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}@2x.png"],
            tileSize: 512,
            attribution: "OpenStreetMap, CARTO",
          },
          carto_labels: {
            type: "raster",
            tiles: ["https://a.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}@2x.png"],
            tileSize: 512,
          },
        },
        layers: [
          { id: "carto_base", type: "raster", source: "carto_base" },
          { id: "carto_labels", type: "raster", source: "carto_labels" },
        ],
      },
      center: [10.4373, 51.1682],
      zoom: 5.6,
      minZoom: 4,
      maxZoom: 16,
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "top-right");

    function fitGermany(duration = 0) {
      map.fitBounds(GERMANY_BOUNDS, {
        padding: 28,
        duration,
      });
    }

    document.getElementById("reset-map").addEventListener("click", () => {
      fitGermany(450);
    });

    map.on("load", () => {
      fitGermany(0);
    });
  </script>
</body>
</html>
